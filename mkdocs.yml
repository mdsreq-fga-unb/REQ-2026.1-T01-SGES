site_name: SGES
site_url: https://mdsreq-fga-unb.github.io/REQ-2026.1-T01-SGES/
repo_url: https://github.com/mdsreq-fga-unb/REQ-2026.1-T01-SGES
repo_name: mdsreq-fga-unb/REQ-2026.1-T01-SGES

theme:
  name: material
  language: pt-BR
  palette:
    # Ativa o Tema Claro por padrão
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para tema escuro
    # Ativa o Tema Escuro
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para tema claro

  font:
    text: Source Sans 3
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:Print ou link de boards (ex: Miro/Trello) utilizados durante a dinâmica.
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link


